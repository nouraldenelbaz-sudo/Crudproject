<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="content-type" content="text/html; charset=utf-8" />
        <title>crud project</title>
        <style>
            * {
            padding:0;
            margin:0;
            box-sizing:border-box;
            }
            body{
            background-color: darkblue;
            }
            form,
            .productsContainer,
            .searchInputAndBtn{
                
            width: 80%;
            margin:50px auto;
            padding:10px;
            display:flex;
            justify-content:center;
            align-items:center;
            }
            form{
             flex-direction:column;
            gap:40px;
            }
            input,
            textarea {
            width:100%;
            padding:10px;
            border:2px solid purple;
            border-radius:10px;
            }
            input:focus,
            textarea:focus{
            outline-color:darkblue;
            }
            
            
            
            button{
            border:none;
            width:150px;
            padding:10px 15px;
            border-radius:10px;
            font-weight:bold;
            color:#fff;
            transition:0.5s;
            }
            
            
            .addProduct {
            background-color:lightskyblue;
            border:1px solid darkblue;
            }
            
            
            .addProduct:hover{
            background-color:rgb(59, 144, 197);
            box-shadow:-5px 5px 15px rgba(59, 144, 197, 0.6);
            }
            
            
            .productsContainer {
            flex-direction:row;
            flex-wrap:wrap;
            gap:40px;
            }
            
            
            .product {
            background-color:white;
            padding:10px;
            border:1px solid magenta;
            width:250px;
            display:flex;
            align-items:center;
            justify-content:space-evenly;
            flex-direction:column;
            border-radius:6px;
            color:#aaa;
            transition:all 0.5s;
            }
            
            .product:hover {
            box-shadow:1px 5px 18px rgba(124, 67, 177, 0.6);
            }
            
            .product .categoryAndPrice{
            display:flex;
            align-items:center;
            justify-content:space-evenly;
            width:100%;
            }
             .product .categoryAndPrice .category{
             color: orangered;
              }
              
             .product .categoryAndPrice .price{
            color: teal;
             }
            
            .product .description {
            color:#888;
            }
            
            
            .updateAndDeleteBtns{
            display:flex;
            align-items:center;
            justify-content:space-between;
            width:100%;
            }
            
            
            .updateAndDeleteBtns button {
            width:120px;
            }
            
            
            .updateAndCanceleBtns {
            display:none;
            gap:40px;
            }
            
            
            .updateAndDeleteBtns .update, 
            .updateAndCanceleBtns .update{
            background-color:orange;
            }
            
            
            .updateAndDeleteBtns .update:hover,
            .updateAndCanceleBtns .update:hover{
            background-color:rgb(153, 103, 11);
            }
            
            
            .updateAndDeleteBtns .delete,
            .updateAndCanceleBtns .cancle,
            .searchInputAndBtn .cancleSearchBtn{
            background-color:rgb(102, 7, 7);
            }
            
            
            .updateAndDeleteBtns .delete:hover,
            .updateAndCanceleBtns .cancle:hover,
            .searchInputAndBtn .cancleSearchBtn:hover{
            background-color:rgb(54, 3, 3);
            }
            .searchInputAndBtn input {
            flex:1;
            }
            .searchInputAndBtn button {
            background-color:darkblue;
            }
            .searchInputAndBtn .cancleSearchBtn {
            display:none;
            }
            img{
                width:100%;
                height:auto;
                
            }
            
        </style>
    </head>
    <body>
        <form action="">
            <input type="text" placeholder="product Title" id="productTitle" />
            <input type="number" placeholder="product Price" id="productPrice" />
            <input 
            type="text"
            placeholder="product Category"
            id="productCategory"
            list="CategoryList"/>
            <datalist id="CategoryList">
            <option value="Laptop"></option>
            <option value="Phones"></option>
            <option value="Screens"></option>
            <option value="Tv"></option>
            </datalist>
            <textarea
            id="productdescription"
            placeholder="product description"></textarea>
            <input type="file" id="imageInput"/>
            <button class="addProduct">addProduct</button>
            <div class="updateAndCanceleBtns">
                <button type="button" class="update">update</button>
                <button type="button" class="cancle">Cancle</button>
            </div>
     </form>
                 <div class="searchInputAndBtn">
                <input
                type="text" 
                id="searchInput"
                placeholder="searsh By Products Name Or Cetagory"
                required/>
                <button class="searchBtn">search</button>
                <button class="cancleSearchBtn">cancle</button>
            </div>
   
        <div class="productsContainer">
           
        </div>
        
            <script>
            let productTitle = document.getElementById("productTitle")
            let productPrice = document.getElementById("productPrice")
            let productCategory = document.getElementById("productCategory")
            let productdescription = document.getElementById("productdescription")
            let productsForm = document.querySelector("form")
            let productsContainer = document.querySelector(".productsContainer")
            let addProductBtn = document.querySelector(".addProduct")
            let updateAndCanceleBtns = document.querySelector(".updateAndCanceleBtns")
            let updateBtn = document.querySelector(".updateAndCanceleBtns .update")
            let cancleBtn = document.querySelector(".updateAndCanceleBtns .cancle")
            let searchInput = document.querySelector("#searchInput")
            let searchBtn = document.querySelector(".searchBtn")
            let cancleSearchBtn = document.querySelector(".searchInputAndBtn .cancleSearchBtn")
            let imageInput = document.getElementById("imageInput")
            
            
            
            
            let products = []
            let globalSelectedIndex;
            if (localStorage.getItem("products") !== null) {
                products = JSON.parse(localStorage.getItem("products"))
                displayProducts()
            }
            productsForm.addEventListener("submit", (e) => {addProduct(e) })
            function addProduct(e) {
            e.preventDefault()
            let product = {
                title: productTitle.value,
                price: productPrice.value,
                cetagory: productCategory.value,
                description: productdescription.value,
              //  imgSrc:`./${imageInput.value.slice(12)}`
              // imgSrc:`./${imageInput.value.split("\\")[2]}`
              imgSrc:`./${imageInput.files[0].name}`
            }
            clearForm()
            products.push(product)
            localStorage.setItem("products", JSON.stringify(products))
            displayProducts()
            
            }
            function clearForm() {
            productTitle.value =""
            productPrice.value =""
            productCategory.value =""
            productdescription.value =""
            imageInput.value = ""
            
            }
            function displayProducts(prods = products) {
            let productBox = ``
            prods.map((p, index) => {
            productBox += `
             <div class="product">
             <img src = ${p.imgSrc} alt=${p.title}/>
                <h2>${p.title}</h2>
                <div class="categoryAndPrice">
                    <p class="category">${p.cetagory}</p>
                    <p class="Price">${p.price}</p>
                </div>
                <p class="description">${p.description}</p>
                <div class="updateAndDeleteBtns">
                <button onclick = "handleUpdateProduct(${index})" class ="update">Update</button>
                <button onclick = "deleteProduct(${index})" class="delete">Delete</button>
                </div>
            </div>`
            })
            productsContainer.innerHTML = productBox
            }
            
            function deleteProduct(selectedProduct) {
            let newProducts = products.filter((p, index) => {
            return index !== selectedProduct
           })
           
           products = newProducts
           displayProducts()
           localStorage.setItem("products", JSON.stringify(products))}
           
           
            function handleUpdateProduct(selectedProduct) {
            globalSelectedIndex = selectedProduct
            productTitle.value = products[selectedProduct].title
            productPrice.value = products[selectedProduct].price
            productCategory.value = products[selectedProduct].cetagory
            productdescription.value = products[selectedProduct].description
            updateAndCanceleBtns.style.display = "flex"
            addProductBtn.style.display ="none"
            
        }
            updateBtn.addEventListener("click", () => {
            products[globalSelectedIndex].title = productTitle.value 
            products[globalSelectedIndex].price = productPrice.value 
            products[globalSelectedIndex].cetagory = productCategory.value
            products[globalSelectedIndex].description = productdescription.value
            displayProducts()
            localStorage.setItem("products", JSON.stringify(products))
            cancleUpdate()
            })
            cancleBtn.addEventListener("click", cancleUpdate)
            function cancleUpdate() {
            clearForm()
            updateAndCanceleBtns.style.display = "none"
            addProductBtn.style.display ="block"
            }
            searchBtn.addEventListener("click", () => {
            searchBtn.style.display = "none"
            cancleSearchBtn.style.display = "block"
            searchProducts(searchInput.value)
            
            })
            cancleSearchBtn.addEventListener("click", () => {
            searchBtn.style.display = "block"
            cancleSearchBtn.style.display = "none"
            searchProducts("")
            searchInput.value = ""
            })
             
            function searchProducts(term) {
            let searchProducts = products.filter((p) => p.title.toLowerCase().includes(term.toLowerCase()) ||p.cetagory.toLowerCase().includes(term.toLowerCase()) )
            displayProducts(searchProducts)
}
        </script>
    </body>
</html>
